# NVC Trader — Fly.io deployment config
# App: nvc-trader-engine
# fly deploy  (from repo root)

app = "nvc-trader-engine"
primary_region = "lhr"    # London — closest to EU/UK markets

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "8000"
  LOG_LEVEL = "INFO"
  # All secrets are set via: fly secrets set KEY=value

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = false   # NEVER stop — agent must run 24/7
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "performance-2x"   # 2 vCPU, 4GB RAM — needed for FinBERT model
  memory = "4096"

[checks]
  [checks.health]
    grace_period = "60s"     # time for FinBERT to load
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 8000
    timeout      = "10s"

# Persistent volume for FinBERT model cache (avoid re-downloading)
[[mounts]]
  source      = "nvc_model_cache"
  destination = "/app/.cache"
